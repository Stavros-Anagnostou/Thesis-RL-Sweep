# =============================================================================
# ESSENTIAL TIER — Minimum viable thesis
#
# PPO IMPALA baseline, UCB-DrAC, PLR, PLR+DrAC (16 games × 5 seeds)
# + DQN baseline (4 games × 5 seeds)
# Total: 340 runs
# =============================================================================

_game_sets:
  representative: &representative_games
    - starpilot
    - bigfish
    - coinrun
    - ninja
  full: &full_games
    - starpilot
    - bigfish
    - coinrun
    - ninja
    - miner
    - dodgeball
    - heist
    - climber
    - maze
    - jumper
    - leaper
    - chaser
    - fruitbot
    - plunder
    - bossfight
    - caveflyer

experiments:

  ppo_impala_baseline:
    config: ppo_procgen_baseline.yaml
    overrides: {encoder: "impala"}
    games: *full_games
    seeds: [1, 2, 3, 4, 5]

  ppo_ucb_drac:
    config: ppo_procgen_ucb_drac.yaml
    games: *full_games
    seeds: [1, 2, 3, 4, 5]

  ppo_plr:
    config: ppo_procgen_plr.yaml
    games: *full_games
    seeds: [1, 2, 3, 4, 5]

  ppo_plr_drac:
    config: ppo_procgen_plr_drac.yaml
    games: *full_games
    seeds: [1, 2, 3, 4, 5]

  dqn_impala_baseline:
    config: dqn_procgen_baseline.yaml
    overrides: {encoder: "impala"}
    games: *representative_games
    seeds: [1, 2, 3, 4, 5]
