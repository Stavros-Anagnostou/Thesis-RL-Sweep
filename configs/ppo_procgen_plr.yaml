# =============================================================================
# PPO + PLR (Prioritized Level Replay)
# Jiang et al. (2021) "Prioritized Level Replay"
# =============================================================================

total_timesteps: 25_000_000
num_envs: 64
num_steps: 256
num_epochs: 3
num_minibatches: 8
learning_rate: 5.0e-4
gamma: 0.999
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
num_levels: 200
start_level: 0
distribution_mode: "easy"
normalize_reward: true
encoder: "impala"
seed: 1
wandb_project: "thesis-rl-baselines"
wandb_entity: null
checkpoint_freq: 500_000
eval_freq: 500_000
eval_episodes: 100
device: "auto"
norm_adv: true

# --- PLR-specific ---
level_selection: "plr"
plr_rho: 0.5                       # probability of replaying a scored level
plr_beta: 0.1                      # temperature for rank-based sampling
plr_scoring: "l1_value_loss"       # scoring function: "l1_value_loss"
plr_staleness_coef: 0.1            # weight on staleness bonus

augmentation_method: "none"
